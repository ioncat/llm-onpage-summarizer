<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Summarizer — Full View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --bg-surface: #2e2e2e;
      --border: #3a3a3a;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      color-scheme: dark;
    }

    :root[data-theme="light"],
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f7f7f8;
        --bg-surface: #ececec;
        --border: #d8d8d8;
        --text: #1a1a1a;
        --text-muted: #777;
        color-scheme: light;
      }
    }

    [data-theme="light"] {
      --bg: #f7f7f8;
      --bg-surface: #ececec;
      --border: #d8d8d8;
      --text: #1a1a1a;
      --text-muted: #777;
      color-scheme: light;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .container {
      max-width: 740px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .badge {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-surface);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-muted);
      transition: color 0.15s, border-color 0.15s;
    }

    button:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .content {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Markdown styles */
    .content h1, .content h2, .content h3 {
      margin: 1.4em 0 0.5em;
      line-height: 1.3;
    }
    .content h1 { font-size: 1.5em; }
    .content h2 { font-size: 1.25em; }
    .content h3 { font-size: 1.1em; }
    .content p { margin: 0.75em 0; }
    .content ul, .content ol { padding-left: 1.5em; margin: 0.75em 0; }
    .content li { margin: 0.3em 0; }
    .content strong { font-weight: 600; }
    .content em { font-style: italic; }
    .content code {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.88em;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
    }
    .content pre {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin: 1em 0;
      overflow-x: auto;
    }
    .content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
    }
    .content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      color: var(--text-muted);
      margin: 1em 0;
    }
    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }

    .content table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 14px; }
    .content th, .content td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
    .content th { background: var(--bg-surface); font-weight: 600; }
    .content tr:nth-child(even) td { background: rgba(128,128,128,0.05); }

    .empty {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      margin-top: 80px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="title">Result</h1>
      <div class="actions">
        <span class="badge" id="char-count"></span>
        <button id="btn-copy">Copy</button>
        <button id="btn-print" onclick="window.print()">Print</button>
      </div>
    </header>
    <div id="content" class="content"></div>
  </div>
  <script src="viewer.js"></script>
</body>
</html>
