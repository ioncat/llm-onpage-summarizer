<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #1a1a1a; color: #e8e8e8; }
    canvas { border: 1px solid #444; margin: 8px; }
    button { margin-top: 16px; padding: 10px 20px; background: #7c6af7; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { background: #6a58e0; }
    .row { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
    label { width: 60px; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <h2>LLM Summarizer — Icon Generator</h2>
  <p style="color:#888;font-size:13px;">Open this file in a browser, click Download All, place PNGs in the icons/ folder.</p>

  <div class="row"><label>16×16</label><canvas id="c16" width="16" height="16"></canvas></div>
  <div class="row"><label>48×48</label><canvas id="c48" width="48" height="48"></canvas></div>
  <div class="row"><label>128×128</label><canvas id="c128" width="128" height="128"></canvas></div>

  <button onclick="downloadAll()">Download All</button>

  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');

      // Background — rounded rect
      const r = s * 0.2;
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();

      // Gradient fill
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, '#7c6af7');
      grad.addColorStop(1, '#5b47e0');
      ctx.fillStyle = grad;
      ctx.fill();

      // Letter "S"
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${s * 0.58}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', s / 2, s * 0.53);
    }

    ['c16', 'c48', 'c128'].forEach(id => {
      drawIcon(document.getElementById(id));
    });

    function downloadAll() {
      [['c16', 'icon16.png'], ['c48', 'icon48.png'], ['c128', 'icon128.png']].forEach(([id, name]) => {
        const a = document.createElement('a');
        a.download = name;
        a.href = document.getElementById(id).toDataURL('image/png');
        a.click();
      });
    }
  </script>
</body>
</html>
