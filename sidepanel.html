<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Summarizer</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <span class="header__title">LLM Summarizer</span>
      <button id="btn-history" class="btn btn--theme" title="History">⏱</button>
      <button id="btn-settings" class="btn btn--theme" title="Settings">⚙</button>
      <button id="btn-theme" class="btn btn--theme" title="Toggle theme">☀</button>
    </header>

    <!-- Settings panel (collapsible) -->
    <section id="settings-panel" class="settings-panel" hidden>
      <div class="settings-row">
        <label class="settings__label" for="model-select">Model</label>
        <div class="model-row">
          <select id="model-select" class="settings__input settings__select">
            <option value="">Loading models…</option>
          </select>
          <button id="btn-refresh-models" class="btn btn--ghost btn--icon" title="Refresh models">↻</button>
        </div>
      </div>
      <div class="settings-row">
        <label class="settings__label" for="url-input">Ollama URL</label>
        <input
          id="url-input"
          class="settings__input"
          type="text"
          placeholder="http://localhost:11434"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="settings-row">
        <div class="prompt-label-row">
          <label class="settings__label" for="prompt-editor">Prompt template</label>
          <button id="btn-reset-prompt" class="btn btn--ghost" style="font-size:11px;padding:3px 8px;">Reset</button>
        </div>
        <textarea
          id="prompt-editor"
          class="settings__input prompt-editor"
          placeholder="Use {{text}} as placeholder for page content"
          spellcheck="false"
        ></textarea>
        <span class="settings__hint">Use <code>{{text}}</code> where page content should go</span>
      </div>
      <label class="settings__toggle">
        <input type="checkbox" id="markdown-toggle" />
        <span>Render Markdown in result</span>
      </label>
    </section>

    <!-- History panel (collapsible) -->
    <section id="history-panel" class="history-panel" hidden>
      <div class="history-header">
        <span class="settings__label">Recent summaries</span>
        <button id="btn-clear-history" class="btn btn--ghost">Clear</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>

    <div class="modes">
      <button class="mode-btn active" data-mode="summarize">Summarize</button>
      <button class="mode-btn" data-mode="keypoints">Key Points</button>
      <button class="mode-btn" data-mode="eli5">ELI5</button>
      <button class="mode-btn" data-mode="translate">Translate</button>
    </div>

    <div class="actions">
      <button id="btn-summarize" class="btn btn--primary">Run</button>
      <button id="btn-stop" class="btn btn--danger" hidden>Stop</button>
    </div>

    <div id="status" class="status" hidden></div>

    <div id="result-wrap" class="result-wrap" hidden>
      <div id="result" class="result"></div>
      <div class="result-footer">
        <span id="char-count" class="char-count"></span>
        <div style="display:flex;gap:6px;">
          <button id="btn-copy" class="btn btn--ghost">Copy</button>
          <button id="btn-clear" class="btn btn--ghost">Clear</button>
        </div>
      </div>
    </div>

    <div id="error" class="error" hidden></div>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
